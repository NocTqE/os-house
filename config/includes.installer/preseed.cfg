# =============================================================================
# SylonOS - Preseed : Installation 100% automatique
# Seules questions posees : langue, clavier, nom d'utilisateur + mot de passe
# =============================================================================

# --- Reseau : config automatique DHCP ---
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string sylon
d-i netcfg/get_domain string local
d-i netcfg/wireless_wep string

# --- Miroir Debian : automatique ---
d-i mirror/country string auto
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# --- Fuseau horaire : Europe/Paris automatique ---
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Paris
d-i clock-setup/ntp boolean true

# --- Partitionnement : 100% automatique ---
# Utilise le premier disque entier, pas de question posee
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true

# --- Compte utilisateur ---
# Pas de root login, l'utilisateur choisit son nom + mot de passe
d-i passwd/root-login boolean false

# --- Selection de packages : pre-definie ---
tasksel tasksel/first multiselect kde-desktop
d-i pkgsel/include string firefox-esr open-vm-tools open-vm-tools-desktop \
    network-manager bash-completion curl wget htop neofetch zip unzip ntfs-3g \
    firmware-linux firmware-linux-nonfree ca-certificates locales pavucontrol \
    plymouth plymouth-themes
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

# --- GRUB : installation automatique ---
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default
d-i grub-installer/with_other_os boolean false

# --- Fin : reboot automatique sans confirmation ---
d-i finish-install/reboot_in_progress note
d-i cdrom-detect/eject boolean true
