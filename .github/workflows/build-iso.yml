name: Build ArcheOS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
      options: --privileged
    timeout-minutes: 120

    steps:
      - name: Install system tools
        run: |
          apt-get update
          apt-get install -y git imagemagick fonts-dejavu-core live-build make curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate assets (logo, wallpaper, splash)
        run: |
          chmod +x generate-assets.sh
          ./generate-assets.sh

      - name: Make scripts executable
        run: |
          chmod +x auto/config auto/build auto/clean
          chmod +x config/hooks/normal/*.hook.chroot

      - name: Configure live-build
        run: lb config

      - name: Build ISO
        run: lb build 2>&1 | tee build.log

      - name: Rename ISO
        run: |
          if [ -f live-image-amd64.hybrid.iso ]; then
            mv live-image-amd64.hybrid.iso arche-os-1.0-amd64.iso
            ls -lh arche-os-1.0-amd64.iso
          else
            echo "ERROR: ISO not found!"
            tail -100 build.log
            exit 1
          fi

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcheOS-ISO
          path: arche-os-1.0-amd64.iso
          retention-days: 7
          compression-level: 0
