name: Build SylonOS ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build imagemagick fonts-dejavu-core

      - name: Generate assets (logo, wallpaper, splash)
        run: |
          chmod +x generate-assets.sh
          ./generate-assets.sh

      - name: Make scripts executable
        run: |
          chmod +x auto/config auto/build auto/clean
          chmod +x config/hooks/normal/*.hook.chroot

      - name: Configure live-build
        run: lb config

      - name: Build ISO
        run: sudo lb build 2>&1 | tee build.log

      - name: Rename ISO
        run: |
          if [ -f live-image-amd64.hybrid.iso ]; then
            mv live-image-amd64.hybrid.iso sylon-os-1.0-amd64.iso
            echo "ISO_NAME=sylon-os-1.0-amd64.iso" >> $GITHUB_ENV
            ls -lh sylon-os-1.0-amd64.iso
          else
            echo "ERROR: ISO not found!"
            cat build.log | tail -100
            exit 1
          fi

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SylonOS-ISO
          path: sylon-os-1.0-amd64.iso
          retention-days: 7
          compression-level: 0
